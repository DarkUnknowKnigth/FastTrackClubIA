<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Fast Track Club - Pro Telemetry</title>
    <!-- Tailwind for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js for interactivity -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            background-image: radial-gradient(circle at top right, rgba(220, 38, 38, 0.15), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(220, 38, 38, 0.1), transparent 40%);
            background-attachment: fixed;
        }
        .mono-font { font-family: 'Share Tech Mono', monospace; }
        .glass-panel {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .text-glow { text-shadow: 0 0 20px rgba(220, 38, 38, 0.6); }
        .led {
            width: 1.2rem; height: 0.4rem; border-radius: 2px;
            background: #222; transition: all 0.1s;
        }
        /* Custom Shift Lights animations triggered by alpine */
        @keyframes shift-flash {
            0%, 100% { box-shadow: 0 0 15px #3b82f6; background: #3b82f6; }
            50% { box-shadow: none; background: #222; }
        }
        .flash-blue { animation: shift-flash 0.1s infinite; }
        
        .scan-container { overflow: hidden; position: relative; }
        .scanline {
            position: absolute; top: 0; left: 0; right: 0; height: 20%;
            background: linear-gradient(to bottom, transparent, rgba(220, 38, 38, 0.05), transparent);
            animation: scanline 3s linear infinite; pointer-events: none; z-index: 20;
        }
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(500%); }
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(220, 38, 38, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(220, 38, 38, 0.8); }
    </style>
</head>
<body class="text-gray-100 min-h-screen p-4 md:p-8 selection:bg-red-500 selection:text-white">
    <div class="max-w-[1400px] mx-auto" x-data="telemetryApp()">
        
        <!-- Header -->
        <header class="mb-8 flex flex-col md:flex-row md:items-end justify-between border-b border-white/10 pb-6">
            <div>
                <h1 class="text-5xl font-bold tracking-tight text-white mb-2">
                    Fast Track <span class="text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-red-700 text-glow">Club</span>
                </h1>
                <p class="text-gray-400 tracking-wide font-light uppercase text-sm flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> Pro Telemetry Analysis
                </p>
            </div>
            
            <!-- Dashboard Top Counters -->
            <div class="flex gap-4 mt-6 md:mt-0" x-show="selectedSession">
                <div class="glass-panel px-6 py-3 rounded-xl border border-white/10 flex flex-col items-center min-w-[120px]">
                    <span class="text-[10px] uppercase text-gray-500 tracking-widest font-bold mb-1">Top Speed</span>
                    <div class="text-2xl font-bold text-white mono-font flex items-end gap-1">
                        <span x-text="selectedSession.maxSpeed.toFixed(1)"></span><span class="text-sm text-red-500 pb-0.5">km/h</span>
                    </div>
                </div>
                <div class="glass-panel px-6 py-3 rounded-xl border border-white/10 flex flex-col items-center min-w-[120px]">
                    <span class="text-[10px] uppercase text-gray-500 tracking-widest font-bold mb-1">Max G-Force</span>
                    <div class="text-2xl font-bold text-white mono-font flex items-end gap-1">
                        <span x-text="selectedSession.maxAccel.toFixed(2)"></span><span class="text-sm text-blue-500 pb-0.5">G</span>
                    </div>
                </div>
            </div>
        </header>
        
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Sidebar -->
            <div class="lg:col-span-3">
                <div class="glass-panel rounded-3xl p-5 sticky top-8">
                    <div class="flex items-center justify-between mb-6 pb-4 border-b border-white/10">
                        <h2 class="text-lg font-semibold tracking-wide text-white">Sesiones</h2>
                        <span class="bg-red-500/20 text-red-400 text-xs py-1 px-2.5 rounded-full font-medium border border-red-500/30" x-text="sessions.length + ' Logs'"></span>
                    </div>
                    
                    <ul class="space-y-3 max-h-[75vh] overflow-y-auto pr-2">
                        <template x-for="session in sessions" :key="session.id">
                            <li>
                                <button 
                                    @click="selectSession(session)"
                                    :class="selectedSession && selectedSession.id === session.id 
                                        ? 'bg-gradient-to-br from-red-600/90 to-red-900/90 shadow-lg shadow-red-900/50 border-red-500/50 scale-[1.02] z-10 relative' 
                                        : 'bg-white/5 hover:bg-white/10 border-white/5 hover:border-white/10 opacity-70 hover:opacity-100'"
                                    class="w-full text-left p-4 rounded-2xl border transition-all duration-300 group">
                                    <div class="flex justify-between items-start mb-2">
                                        <div class="font-bold text-white group-hover:text-white transition-colors">
                                            Run #<span x-text="session.id"></span>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-2 text-xs mb-3 text-gray-300 group-hover:text-red-100">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                        <span class="font-medium truncate" x-text="session.pilot"></span>
                                    </div>
                                </button>
                            </li>
                        </template>
                    </ul>
                </div>
            </div>
            
            <!-- Main Content Area -->
            <div class="lg:col-span-9" x-show="selectedSession" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0">
                
                <div class="grid grid-cols-1 gap-8">
                    
                    <!-- Graph Row -->
                    <div class="glass-panel rounded-3xl p-6 relative shadow-2xl border border-white/10">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-sm uppercase tracking-widest text-gray-400 font-bold flex items-center gap-2">
                                <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                                Análisis de Telemetría Dinámica
                            </h3>
                            <!-- Shift Lights Simulation -->
                            <div class="flex gap-1 bg-black/50 p-1.5 rounded border border-white/10" id="shiftLights" x-effect="animateShiftLights()">
                                <div class="led" :class="shiftLevel > 0 ? 'bg-green-500 shadow-[0_0_8px_#10b981]' : ''"></div>
                                <div class="led" :class="shiftLevel > 1 ? 'bg-green-500 shadow-[0_0_8px_#10b981]' : ''"></div>
                                <div class="led" :class="shiftLevel > 2 ? 'bg-green-500 shadow-[0_0_8px_#10b981]' : ''"></div>
                                <div class="led" :class="shiftLevel > 3 ? 'bg-yellow-500 shadow-[0_0_8px_#f59e0b]' : ''"></div>
                                <div class="led" :class="shiftLevel > 4 ? 'bg-yellow-500 shadow-[0_0_8px_#f59e0b]' : ''"></div>
                                <div class="led" :class="shiftLevel > 5 ? 'bg-red-500 shadow-[0_0_8px_#ef4444]' : ''"></div>
                                <div class="led" :class="shiftLevel > 6 ? 'bg-red-500 shadow-[0_0_8px_#ef4444]' : ''"></div>
                                <div class="led" :class="shiftLevel > 7 ? 'flash-blue' : ''"></div>
                                <div class="led" :class="shiftLevel > 7 ? 'flash-blue' : ''"></div>
                            </div>
                        </div>
                        
                        <div class="w-full h-[300px] relative">
                            <canvas id="telemetryChart"></canvas>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
                        <!-- Report Column -->
                        <div class="glass-panel rounded-3xl p-8 relative overflow-hidden group border border-white/10">
                            <div class="absolute top-0 right-0 w-32 h-32 bg-red-500/10 rounded-bl-full -z-10 group-hover:bg-red-500/20 transition-colors duration-500"></div>
                            <div class="flex items-center gap-3 mb-6">
                                <div class="bg-red-500/20 p-2 rounded-xl border border-red-500/30">
                                    <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                                </div>
                                <div>
                                    <h3 class="text-xs uppercase tracking-widest text-gray-400 font-semibold">AI Feedback</h3>
                                    <h4 class="text-xl font-bold text-white">Reporte de Pista</h4>
                                </div>
                            </div>
                            <div class="prose prose-sm prose-invert prose-p:text-gray-300 prose-p:leading-relaxed prose-strong:text-white max-w-none" 
                                 x-html="formatReport(selectedSession.report)">
                            </div>
                        </div>

                        <!-- Map Column -->
                        <div class="glass-panel rounded-3xl p-2 h-[500px] flex flex-col relative overflow-hidden shadow-2xl border border-white/10 scan-container group">
                            <div class="scanline"></div>
                            <div class="absolute inset-x-0 top-0 h-16 bg-gradient-to-b from-black/80 to-transparent z-10 rounded-t-3xl pointer-events-none flex items-start justify-between p-4">
                                <span class="bg-black/80 border border-white/10 text-white text-[10px] uppercase px-3 py-1 rounded font-bold tracking-widest shadow-lg mono-font text-glow">GPS Tracker</span>
                            </div>
                            <div class="flex-grow rounded-2xl overflow-hidden bg-black relative z-0">
                                <iframe :src="selectedSession.map_file" class="w-full h-full border-0 filter opacity-90 saturate-[1.2] group-hover:opacity-100 transition-opacity duration-500"></iframe>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="lg:col-span-9" x-show="!selectedSession" style="display: none;">
                <!-- Empty state handled gracefully -->
            </div>
        </div>
    </div>

    <script>
        let telemetryChartInstance = null;

        function telemetryApp() {
            return {
                sessions: {{ sessions_json | safe }},
                selectedSession: null,
                shiftLevel: 0,
                
                init() {
                    if (this.sessions.length > 0) {
                        this.selectSession(this.sessions[0]);
                    }
                    
                    // Watch for session changes to update chart
                    this.$watch('selectedSession', (val) => {
                        if(val) this.updateChart();
                    });
                },
                
                selectSession(session) {
                    this.selectedSession = session;
                    // Trigger a random shift light animation just for visual effect on load
                    this.animateShiftLights();
                },
                
                animateShiftLights() {
                    let level = 0;
                    const interval = setInterval(() => {
                        this.shiftLevel = level++;
                        if(level > 9) {
                            clearInterval(interval);
                            setTimeout(() => this.shiftLevel = 0, 500); // turn off
                        }
                    }, 100);
                },
                
                updateChart() {
                    if(!this.selectedSession) return;
                    
                    const ctx = document.getElementById('telemetryChart').getContext('2d');
                    
                    if (telemetryChartInstance) {
                        telemetryChartInstance.destroy();
                    }

                    // Create gradient for speed line
                    const gradientSpeed = ctx.createLinearGradient(0, 0, 0, 400);
                    gradientSpeed.addColorStop(0, 'rgba(239, 68, 68, 0.8)'); // Red-500
                    gradientSpeed.addColorStop(1, 'rgba(239, 68, 68, 0.0)');

                    telemetryChartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: this.selectedSession.telemetry_labels,
                            datasets: [
                                {
                                    label: 'Velocidad (km/h)',
                                    data: this.selectedSession.telemetry_speed,
                                    borderColor: '#ef4444',
                                    backgroundColor: gradientSpeed,
                                    borderWidth: 2,
                                    fill: true,
                                    pointRadius: 0,
                                    tension: 0.4,
                                    yAxisID: 'y'
                                },
                                {
                                    label: 'Fuerza G (Longitudinal)',
                                    data: this.selectedSession.telemetry_accel,
                                    borderColor: '#ffffff',
                                    borderWidth: 1.5,
                                    borderDash: [5, 5],
                                    fill: false,
                                    pointRadius: 0,
                                    tension: 0.1,
                                    yAxisID: 'y1'
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            interaction: {
                                mode: 'index',
                                intersect: false,
                            },
                            plugins: {
                                legend: {
                                    labels: { color: '#9ca3af', font: { family: 'Inter' } }
                                },
                                tooltip: {
                                    backgroundColor: 'rgba(0,0,0,0.8)',
                                    titleFont: { family: 'Share Tech Mono' },
                                    bodyFont: { family: 'Share Tech Mono' },
                                    padding: 12,
                                    borderColor: 'rgba(255,255,255,0.1)',
                                    borderWidth: 1
                                }
                            },
                            scales: {
                                x: {
                                    display: false // hide labels since it's just point index
                                },
                                y: {
                                    type: 'linear',
                                    display: true,
                                    position: 'left',
                                    grid: { color: 'rgba(255,255,255,0.05)' },
                                    ticks: { color: '#9ca3af', font: { family: 'Share Tech Mono' } }
                                },
                                y1: {
                                    type: 'linear',
                                    display: true,
                                    position: 'right',
                                    grid: { drawOnChartArea: false },
                                    ticks: { color: '#ffffff', font: { family: 'Share Tech Mono' } }
                                }
                            }
                        }
                    });
                },
                
                formatReport(text) {
                    if(!text) return "";
                    return text
                        .replace(/### (.*)/g, '<h4 class="text-sm tracking-widest uppercase text-red-500 font-bold mt-2 mb-4 border-b border-white/10 pb-2">$1</h4>')
                        .replace(/\*\*(.*?)\*\*/g, '<strong class="text-white font-semibold">$1</strong>')
                        .replace(/\n\n/g, '</p><p class="mt-3">')
                        .replace(/\n/g, '<br/>')
                        .replace(/^/, '<p>') + '</p>';
                }
            }
        }
    </script>
</body>
</html>
